name: Luminary CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Smart Contract Tests ──────────────────────────────────────────────────
  contract-tests:
    name: 🦀 Smart Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Soroban CLI
        run: |
          cargo install --locked soroban-cli --features opt 2>/dev/null || true
          soroban --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy linter
        run: cargo clippy --all-targets -- -D warnings

      - name: Run attestation-registry tests
        run: cargo test -p attestation-registry --features testutils -- --nocapture

      - name: Run reputation-scorer tests
        run: cargo test -p reputation-scorer --features testutils -- --nocapture

      - name: Build WASM contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release -p attestation-registry
          cargo build --target wasm32-unknown-unknown --release -p reputation-scorer

      - name: Optimize WASM (soroban optimize)
        run: |
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/attestation_registry.wasm \
            --wasm-out target/wasm32-unknown-unknown/release/attestation_registry.optimized.wasm
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/reputation_scorer.wasm \
            --wasm-out target/wasm32-unknown-unknown/release/reputation_scorer.optimized.wasm

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: |
            contracts/target/wasm32-unknown-unknown/release/*.optimized.wasm
          retention-days: 30

  # ─── Frontend Tests & Build ────────────────────────────────────────────────
  frontend-tests:
    name: ⚡ Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Vitest unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_ATTESTATION_REGISTRY_ID: ${{ secrets.ATTESTATION_REGISTRY_ID || 'PLACEHOLDER' }}
          VITE_REPUTATION_SCORER_ID:    ${{ secrets.REPUTATION_SCORER_ID    || 'PLACEHOLDER' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Deploy to Testnet (main branch only) ─────────────────────────────────
  deploy-contracts:
    name: 🚀 Deploy Contracts to Testnet
    needs: [contract-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            contracts/target/
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-contracts
          path: contracts/target/wasm32-unknown-unknown/release/

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli --features opt 2>/dev/null || true

      - name: Configure Soroban network
        run: |
          soroban network add \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            testnet || true

      - name: Fund deployer account
        run: |
          soroban keys generate deployer --network testnet 2>/dev/null || true
          curl -s "https://friendbot.stellar.org?addr=$(soroban keys address deployer)" | jq .

      - name: Deploy AttestationRegistry
        id: deploy-registry
        run: |
          REGISTRY_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/attestation_registry.optimized.wasm \
            --source deployer \
            --network testnet)
          echo "REGISTRY_ID=$REGISTRY_ID" >> $GITHUB_OUTPUT
          echo "AttestationRegistry deployed at: $REGISTRY_ID"

      - name: Deploy ReputationScorer
        id: deploy-scorer
        run: |
          SCORER_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/reputation_scorer.optimized.wasm \
            --source deployer \
            --network testnet)
          echo "SCORER_ID=$SCORER_ID" >> $GITHUB_OUTPUT
          echo "ReputationScorer deployed at: $SCORER_ID"

      - name: Initialize contracts
        run: |
          DEPLOYER_ADDR=$(soroban keys address deployer)
          REGISTRY_ID="${{ steps.deploy-registry.outputs.REGISTRY_ID }}"
          SCORER_ID="${{ steps.deploy-scorer.outputs.SCORER_ID }}"

          # Initialize AttestationRegistry
          soroban contract invoke \
            --id "$REGISTRY_ID" \
            --source deployer \
            --network testnet \
            -- initialize \
            --admin "$DEPLOYER_ADDR" \
            --scorer_address "$SCORER_ID"

          # Initialize ReputationScorer
          soroban contract invoke \
            --id "$SCORER_ID" \
            --source deployer \
            --network testnet \
            -- initialize \
            --admin "$DEPLOYER_ADDR" \
            --registry_address "$REGISTRY_ID"

          echo "✅ Both contracts initialized successfully"

      - name: Save deployment info
        run: |
          mkdir -p ../deployment
          cat > ../deployment/testnet.json << EOF
          {
            "network": "testnet",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "attestation_registry": "${{ steps.deploy-registry.outputs.REGISTRY_ID }}",
            "reputation_scorer": "${{ steps.deploy-scorer.outputs.SCORER_ID }}",
            "commit": "${{ github.sha }}"
          }
          EOF
          cat ../deployment/testnet.json

      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info
          path: deployment/testnet.json

  # ─── Deploy Frontend to Vercel ────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend to Vercel
    needs: [deploy-contracts, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
